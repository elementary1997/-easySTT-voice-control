name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.cr.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: cr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "easySTT Voice Control ${{ github.ref_name }}" \
            --notes "## easySTT Voice Control ${{ github.ref_name }}

          Плагин голосовых команд для [easySTT](https://github.com/elementary1997/easySTT).

          ## Установка

          1. Скачайте бинарник для своей платформы ниже
          2. В easySTT → Настройки → Плагины → **+ Добавить плагин**
          3. Выберите скачанный файл — easySTT запустит его автоматически
          4. Откройте настройки плагина и добавьте команды
          5. Говорите: *«Вилли, открой браузер»*

          ## Файлы

          | Файл | Платформа |
          |------|-----------|
          | \`easySTT-voice-control-windows.exe\` | Windows (standalone, без установки) |
          | \`easySTT-voice-control-linux\` | Linux (amd64) |"

          ID=$(gh release view "${{ github.ref_name }}" --json id --jq '.id')
          echo "release_id=$ID" >> $GITHUB_OUTPUT

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            binary: src-tauri/target/release/easystt-voice-control
            artifact_name: easySTT-voice-control-linux
          - platform: windows-latest
            binary: src-tauri/target/release/easystt-voice-control.exe
            artifact_name: easySTT-voice-control-windows.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build standalone binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --features custom-protocol

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ matrix.binary }}#${{ matrix.artifact_name }}" \
            --repo "${{ github.repository }}"

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
