name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.cr.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: cr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "easySTT Voice Control ${{ github.ref_name }}" \
            --notes "## easySTT Voice Control ${{ github.ref_name }}

          Плагин голосовых команд для [easySTT](https://github.com/elementary1997/easySTT).

          ## Установка

          1. Скачайте бинарник для своей платформы
          2. В easySTT → Настройки → 🧩 Плагины → **+ Добавить плагин**
          3. Выберите скачанный файл, порт 8790
          4. Говорите: *«Вилли, открой проводник»*

          ## Файлы

          | Файл | Платформа |
          |------|-----------|
          | \`*_x64-setup.exe\` | Windows |
          | \`*_amd64.deb\` | Linux |"

          ID=$(gh release view "${{ github.ref_name }}" --json id --jq '.id')
          echo "release_id=$ID" >> $GITHUB_OUTPUT

  release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: Linux
          - platform: windows-latest
            name: Windows

    runs-on: ${{ matrix.platform }}
    name: Release (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  publish-release:
    needs: [create-release, release]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
